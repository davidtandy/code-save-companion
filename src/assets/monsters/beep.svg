<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Beep: yellow robot -->
  <!-- Antenna -->
  <line x1="50" y1="13" x2="50" y2="24" stroke="#b8960c" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="50" cy="10" r="6" fill="#FF6B6B"/>
  <!-- Body (rounded square) -->
  <rect x="12" y="24" width="76" height="70" rx="16" fill="#F1C40F"/>
  <!-- Rectangular eyes -->
  <rect x="23" y="36" width="20" height="16" rx="4" fill="#222"/>
  <rect x="57" y="36" width="20" height="16" rx="4" fill="#222"/>
  <rect x="25" y="38" width="8" height="12" rx="3" fill="#00E5FF"/>
  <rect x="59" y="38" width="8" height="12" rx="3" fill="#00E5FF"/>
  <!-- Bolt cheeks -->
  <text x="17" y="65" font-size="12" fill="#b8960c" font-family="sans-serif">⚡</text>
  <text x="71" y="65" font-size="12" fill="#b8960c" font-family="sans-serif">⚡</text>
  <!-- Speaker mouth -->
  <rect x="28" y="64" width="44" height="18" rx="5" fill="#b8960c"/>
  <circle cx="38" cy="73" r="3" fill="#F1C40F"/>
  <circle cx="50" cy="73" r="3" fill="#F1C40F"/>
  <circle cx="62" cy="73" r="3" fill="#F1C40F"/>
</svg>
