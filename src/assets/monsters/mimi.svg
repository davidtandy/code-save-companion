<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Mimi: pink with flower + lashes -->
  <!-- Flower petals -->
  <circle cx="50" cy="8" r="7" fill="#ffb3e0"/>
  <circle cx="61" cy="12" r="7" fill="#ffb3e0"/>
  <circle cx="39" cy="12" r="7" fill="#ffb3e0"/>
  <circle cx="56" cy="20" r="7" fill="#ffb3e0"/>
  <circle cx="44" cy="20" r="7" fill="#ffb3e0"/>
  <!-- Flower centre -->
  <circle cx="50" cy="14" r="8" fill="#FFD93D"/>
  <!-- Body -->
  <circle cx="50" cy="58" r="40" fill="#EC407A"/>
  <!-- Eyes -->
  <circle cx="36" cy="52" r="11" fill="white"/>
  <circle cx="64" cy="52" r="11" fill="white"/>
  <circle cx="36" cy="52" r="7" fill="#222"/>
