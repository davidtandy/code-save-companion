  <!-- Lashes -->
  <line x1="28" y1="43" x2="24" y2="37" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="41" x2="30" y2="35" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="41" x2="53" y2="35" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="61" y1="43" x2="58" y2="37" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="24" cy="63" r="8" fill="#ff70c0" opacity="0.35"/>
  <circle cx="76" cy="63" r="8" fill="#ff70c0" opacity="0.35"/>
  <!-- Smile -->
