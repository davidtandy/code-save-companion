<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Norp: hot pink with tentacle hair and swirly eyes -->
  <!-- Tentacles on top -->
  <path d="M30 24 Q24 10 28 4 Q32 10 30 24" fill="#c2185b"/>
  <path d="M40 18 Q38 4 44 1 Q46 8 40 18" fill="#c2185b"/>
  <path d="M60 18 Q62 4 56 1 Q54 8 60 18" fill="#c2185b"/>
  <path d="M70 24 Q76 10 72 4 Q68 10 70 24" fill="#c2185b"/>
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="38" ry="40" fill="#E91E8C"/>
  <!-- Swirly dizzy eyes -->
  <circle cx="35" cy="52" r="11" fill="white"/>
  <circle cx="65" cy="52" r="11" fill="white"/>
  <!-- Left spiral -->
  <path d="M35 46 A6 6 0 1 1 34 52" stroke="#c2185b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="35" cy="52" r="2" fill="#c2185b"/>
  <!-- Right spiral -->
  <path d="M65 46 A6 6 0 1 1 64 52" stroke="#c2185b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="65" cy="52" r="2" fill="#c2185b"/>
  <!-- Open happy mouth -->
  <path d="M34 72 Q50 84 66 72" fill="#c2185b"/>
  <path d="M34 72 Q50 79 66 72" fill="white"/>
</svg>
