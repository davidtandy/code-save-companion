<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wibble: lime green with spiral eyes + legs -->
  <!-- Stubby legs -->
  <rect x="28" y="90" width="14" height="10" rx="7" fill="#6a9a35"/>
  <rect x="58" y="90" width="14" height="10" rx="7" fill="#6a9a35"/>
  <!-- Body -->
  <circle cx="50" cy="54" r="40" fill="#8BC34A"/>
  <!-- Spiral eyes (concentric rings) -->
  <circle cx="35" cy="50" r="12" fill="white"/>
  <circle cx="65" cy="50" r="12" fill="white"/>
  <circle cx="35" cy="50" r="9" fill="#6a9a35"/>
  <circle cx="65" cy="50" r="9" fill="#6a9a35"/>
  <circle cx="35" cy="50" r="6" fill="white"/>
  <circle cx="65" cy="50" r="6" fill="white"/>
  <circle cx="35" cy="50" r="3" fill="#6a9a35"/>
  <circle cx="65" cy="50" r="3" fill="#6a9a35"/>
  <circle cx="35" cy="50" r="1.5" fill="white"/>
  <circle cx="65" cy="50" r="1.5" fill="white"/>
  <!-- Happy mouth -->
  <path d="M33 70 Q50 83 67 70" stroke="#3a5e1a" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
