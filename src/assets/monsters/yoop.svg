<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yoop: lavender with question mark antenna and curious eyes -->
  <!-- Question mark antenna -->
  <path d="M50 22 C50 14 58 10 58 6 C58 2 54 0 50 2 C46 4 44 8 46 12" stroke="#7B4FA6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="46" cy="16" r="2.5" fill="#7B4FA6"/>
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="38" ry="38" fill="#CE93D8"/>
  <!-- One eyebrow raised (curious) -->
  <path d="M24 40 Q34 36 40 40" stroke="#7B4FA6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M58 38 Q66 36 74 40" stroke="#7B4FA6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyes — one slightly wider -->
  <circle cx="32" cy="50" r="11" fill="white"/>
  <circle cx="68" cy="50" r="9" fill="white"/>
  <circle cx="32" cy="50" r="6" fill="#222"/>
  <circle cx="68" cy="50" r="5" fill="#222"/>
  <circle cx="34" cy="47" r="2.5" fill="white"/>
  <circle cx="70" cy="47" r="2" fill="white"/>
  <!-- Small O mouth -->
  <ellipse cx="50" cy="70" rx="6" ry="7" fill="#7B4FA6"/>
  <ellipse cx="50" cy="70" rx="3.5" ry="5" fill="#f8c8ff"/>
</svg>
