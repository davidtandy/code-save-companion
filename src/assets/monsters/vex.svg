<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vex: amber/gold with geometric hexagon patterns and diamond eyes -->
  <!-- Body -->
  <circle cx="50" cy="55" r="40" fill="#F9A825"/>
  <!-- Hex pattern on body -->
  <polygon points="50,26 56,29 56,35 50,38 44,35 44,29" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <polygon points="30,50 36,53 36,59 30,62 24,59 24,53" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <polygon points="70,50 76,53 76,59 70,62 64,59 64,53" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <polygon points="50,72 56,75 56,81 50,84 44,81 44,75" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <!-- Diamond eyes -->
  <path d="M30 44 L38 52 L30 60 L22 52 Z" fill="white"/>
  <path d="M70 44 L78 52 L70 60 L62 52 Z" fill="white"/>
  <path d="M30 47 L35 52 L30 57 L25 52 Z" fill="#e65100"/>
  <path d="M70 47 L75 52 L70 57 L65 52 Z" fill="#e65100"/>
  <circle cx="30" cy="52" r="2" fill="#222"/>
  <circle cx="70" cy="52" r="2" fill="#222"/>
  <!-- Angular grin -->
  <path d="M32 70 L40 66 L50 72 L60 66 L68 70" stroke="#e65100" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
